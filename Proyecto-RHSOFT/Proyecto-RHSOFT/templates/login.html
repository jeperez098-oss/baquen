<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login RHSOFT | COBALSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-tr from-blue-900 to-indigo-950 flex items-center justify-center h-screen">
    <div class="bg-white/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-white/20">
        <div class="text-center mb-6">
            <h1 class="text-4xl font-black tracking-wide text-blue-950">COBALSA</h1>
            <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest mt-1">Colombiana de Balsa Ltda</p>
        </div>
        <h2 class="text-xl font-semibold text-gray-800 text-center mb-6">Iniciar Sesión</h2>
        <form action="/validar-login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nombre de Usuario</label>
                <input type="text" name="usuario" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Contraseña</label>
                <input type="password" name="password" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600">
            </div>
            <button type="submit" class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-bold py-3 rounded-xl shadow-lg transition">Ingresar</button>
        </form>
    </div>
</body>
</html>
